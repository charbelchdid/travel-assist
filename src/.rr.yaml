version: "3"

rpc:
  listen: tcp://127.0.0.1:6001

server:
  command: "php worker.php"

temporal:
  # In docker-compose this resolves to the Temporal service container.
  # If running locally without Docker, change to "127.0.0.1:7233".
  address: "temporal:7233"
  activities:
    num_workers: 10

logs:
  level: debug
  channels:
    temporal.level: error


